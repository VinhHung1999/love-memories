pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension){ ex -> ex.autolinkLibrariesFromCommand() }

// Mapbox private Maven repo — must be in settings.gradle because RN 0.76 uses
// dependencyResolutionManagement(PREFER_SETTINGS) which ignores allprojects{} in build.gradle
dependencyResolutionManagement {
    repositories {
        // async-storage v3 ships shared_storage as local Maven artifact
        mavenLocal()
        maven {
            url 'https://api.mapbox.com/downloads/v2/releases/maven'
            authentication {
                basic(BasicAuthentication)
            }
            credentials {
                username = 'mapbox'
                password = providers.gradleProperty('MAPBOX_DOWNLOADS_TOKEN').orElse('').get()
            }
        }
    }
}

rootProject.name = 'LoveScrum'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
